<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Messages</title>

    <style>

        body{
            background:black;
            color:white;
            font-family:Arial;
            margin:0;
            padding:20px;
        }

        h1{
            text-align:center;
            color:cyan;
        }

        button{
            padding:10px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .load-btn{
            background:cyan;
            color:black;
            margin-bottom:20px;
        }

        .delete-btn{
            background:red;
            color:white;
        }

        .check-btn{
            background:green;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            background:#111;
        }

        th{
            background:cyan;
            color:black;
            padding:15px;
        }

        td{
            border:1px solid #333;
            padding:12px;
            text-align:center;
        }

        tr:hover{
            background:#222;
        }

        .checked-row{
            background:darkgreen !important;
        }

    </style>
</head>

<body>

<h1>Contact Messages (Database View)</h1>

<center>
    <button class="load-btn" onclick="loadData()">
        Load Messages
    </button>
</center>

<table id="table">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Message</th>
        <th>Checked</th>
        <th>Delete</th>
    </tr>

</table>

<script>

async function loadData() {

    const res = await fetch("https://portfolio-app-3-2nn4.onrender.com/api/contact");

    const data = await res.json();

    let table = document.getElementById("table");

    table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Message</th>
            <th>Checked</th>
            <th>Delete</th>
        </tr>
    `;

    // LOCAL STORAGE
    let deletedIds = JSON.parse(localStorage.getItem("deletedRows")) || [];
    let checkedIds = JSON.parse(localStorage.getItem("checkedRows")) || [];

    data.forEach(item => {

        // HIDE DELETED ROWS FOREVER
        if(deletedIds.includes(item.id)){
            return;
        }

        let row = table.insertRow();

        row.insertCell(0).innerHTML = item.id;
        row.insertCell(1).innerHTML = item.name;
        row.insertCell(2).innerHTML = item.email;
        row.insertCell(3).innerHTML = item.phone || "N/A";
        row.insertCell(4).innerHTML = item.message;

        // CHECK BUTTON
        let checkCell = row.insertCell(5);

        let checkBtn = document.createElement("button");

        // IF ALREADY CHECKED
        if(checkedIds.includes(item.id)){

            row.classList.add("checked-row");

            checkBtn.innerHTML = "✓ Checked";

            checkBtn.disabled = true;

        }else{

            checkBtn.innerHTML = "✓ Check";

        }

        checkBtn.className = "check-btn";

        checkBtn.onclick = function () {

            // TURN GREEN
            row.classList.add("checked-row");

            // CHANGE BUTTON
            checkBtn.innerHTML = "✓ Checked";

            // DISABLE BUTTON
            checkBtn.disabled = true;

            // SAVE TO LOCAL STORAGE
            checkedIds.push(item.id);

            localStorage.setItem(
                "checkedRows",
                JSON.stringify(checkedIds)
            );
        };

        checkCell.appendChild(checkBtn);

        // DELETE BUTTON
        let deleteCell = row.insertCell(6);

        let deleteBtn = document.createElement("button");

        deleteBtn.innerHTML = "Delete";

        deleteBtn.className = "delete-btn";

        deleteBtn.onclick = function () {

            // REMOVE ROW
            row.remove();

            // SAVE DELETE
            deletedIds.push(item.id);

            localStorage.setItem(
                "deletedRows",
                JSON.stringify(deletedIds)
            );
        };

        deleteCell.appendChild(deleteBtn);

    });

}

</script>

</body>
</html>
