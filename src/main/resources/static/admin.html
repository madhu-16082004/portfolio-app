<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Messages</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: white;
        }

        h1 {
            margin-top: 30px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            background: #00c6ff;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ffcc;
            transform: scale(1.05);
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        th {
            background: rgba(0, 198, 255, 0.3);
            color: white;
            font-size: 14px;
        }

        tr {
            transition: 0.3s;
        }

        tr:hover {
            background: rgba(255,255,255,0.1);
        }

        td {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin-top: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Contact Messages Dashboard</h1>

    <button onclick="loadData()">Load Messages</button>

    <div class="card">
        <table id="table">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Message</th>
            </tr>
        </table>
    </div>

</div>

<script>
async function loadData() {

    const res = await fetch("https://portfolio-app-3-2nn4.onrender.com/api/contact");
    const data = await res.json();

    let table = document.getElementById("table");

    table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Message</th>
        </tr>
    `;

    data.forEach(item => {
        let row = table.insertRow();

        row.insertCell(0).innerHTML = item.id;
        row.insertCell(1).innerHTML = item.name;
        row.insertCell(2).innerHTML = item.email;
        row.insertCell(3).innerHTML = item.phone || "N/A";
        row.insertCell(4).innerHTML = item.message;
    });
}
</script>

</body>
</html>
