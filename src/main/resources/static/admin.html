<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Messages</title>

    <style>

        body{
            background:black;
            color:white;
            font-family:Arial;
            margin:0;
            padding:20px;
        }

        h1{
            text-align:center;
            color:cyan;
        }

        button{
            padding:10px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .load-btn{
            background:cyan;
            color:black;
            margin-bottom:20px;
        }

        .delete-btn{
            background:red;
            color:white;
        }

        .check-btn{
            background:green;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            background:#111;
        }

        th{
            background:cyan;
            color:black;
            padding:15px;
        }

        td{
            border:1px solid #333;
            padding:12px;
            text-align:center;
        }

        tr:hover{
            background:#222;
        }

        .checked-row{
            background:darkgreen !important;
        }

    </style>
</head>

<body>

<h1>Contact Messages (Database View)</h1>

<center>
    <button class="load-btn" onclick="loadData()">
        Load Messages
    </button>
</center>

<table id="table">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Message</th>
        <th>Checked</th>
        <th>Delete</th>
    </tr>

</table>

<script>

async function loadData() {

    const res = await fetch("https://portfolio-app-3-2nn4.onrender.com/api/contact");

    const data = await res.json();

    let table = document.getElementById("table");

    table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Message</th>
            <th>Checked</th>
            <th>Delete</th>
        </tr>
    `;

    data.forEach(item => {

        let row = table.insertRow();

        row.insertCell(0).innerHTML = item.id;
        row.insertCell(1).innerHTML = item.name;
        row.insertCell(2).innerHTML = item.email;
        row.insertCell(3).innerHTML = item.phone || "N/A";
        row.insertCell(4).innerHTML = item.message;

        // CHECK BUTTON FOR EACH ROW
        let checkCell = row.insertCell(5);

        let checkBtn = document.createElement("button");

        checkBtn.innerHTML = "✓ Check";
        checkBtn.className = "check-btn";

        checkBtn.onclick = function () {

            row.classList.toggle("checked-row");

            if(row.classList.contains("checked-row")){
                checkBtn.innerHTML = "✓ Checked";
            }else{
                checkBtn.innerHTML = "✓ Check";
            }

        };

        checkCell.appendChild(checkBtn);

        // DELETE BUTTON FOR EACH ROW
        let deleteCell = row.insertCell(6);

        let deleteBtn = document.createElement("button");

        deleteBtn.innerHTML = "Delete";
        deleteBtn.className = "delete-btn";

        deleteBtn.onclick = function () {
            row.remove();
        };

        deleteCell.appendChild(deleteBtn);

    });

}

</script>

</body>
</html>
