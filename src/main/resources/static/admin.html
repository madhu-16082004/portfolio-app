<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Messages</title>
    
    <style>

        body{
            background:black;
            color:white;
            font-family:Arial;
            margin:0;
            padding:20px;
        }

        h1{
            text-align:center;
            color:cyan;
        }

        button{
            padding:10px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .load-btn{
            background:cyan;
            color:black;
            margin-bottom:20px;
        }

        .delete-btn{
            background:red;
            color:white;
        }

        .check-btn{
            background:green;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            background:#111;
        }

        th{
            background:cyan;
            color:black;
            padding:15px;
        }

        td{
            border:1px solid #333;
            padding:12px;
            text-align:center;
        }

        tr:hover{
            background:#222;
        }

        .checked-row{
            background:darkgreen !important;
        }

    </style>
</head>

<body>

<h1>Contact Messages (Database View)</h1>

<center>
    <button class="load-btn" onclick="loadData()">
        Load Messages
    </button>
</center>

<table id="table">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Message</th>
        <th>Checked</th>
        <th>Delete</th>
    </tr>

</table>

<script>

async function loadData() {

    const res = await fetch("/api/contact", {
        cache: "no-store"
    });

    const data = await res.json();

    const table = document.getElementById("table");

    // CLEAR ONLY ROWS (NOT ENTIRE TABLE TAG)
    table.innerHTML = `
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Message</th>
            <th>Checked</th>
            <th>Delete</th>
        </tr>
    `;

    let deletedIds = JSON.parse(localStorage.getItem("deletedRows")) || [];
    let checkedIds = JSON.parse(localStorage.getItem("checkedRows")) || [];

    data.forEach(item => {

        if (deletedIds.includes(String(item.id))) return;

        let row = table.insertRow();

        row.insertCell(0).innerText = item.id;
        row.insertCell(1).innerText = item.name;
        row.insertCell(2).innerText = item.email;
        row.insertCell(3).innerText = item.phone || "N/A";
        row.insertCell(4).innerText = item.message;

        let checkCell = row.insertCell(5);
        let checkBtn = document.createElement("button");

        checkBtn.className = "check-btn";

        if (checkedIds.includes(String(item.id))) {
            row.classList.add("checked-row");
            checkBtn.innerText = "Checked";
            checkBtn.disabled = true;
        } else {
            checkBtn.innerText = "Check";
        }

        checkBtn.onclick = () => {
            row.classList.add("checked-row");
            checkBtn.innerText = "Checked";
            checkBtn.disabled = true;

            checkedIds.push(String(item.id));
            localStorage.setItem("checkedRows", JSON.stringify(checkedIds));
        };

        checkCell.appendChild(checkBtn);

        let deleteCell = row.insertCell(6);
        let deleteBtn = document.createElement("button");

        deleteBtn.innerText = "Delete";
        deleteBtn.className = "delete-btn";

        deleteBtn.onclick = () => {
            row.remove();

            deletedIds.push(String(item.id));
            localStorage.setItem("deletedRows", JSON.stringify(deletedIds));
        };

        deleteCell.appendChild(deleteBtn);
    });
}

</script>

</body>
</html>
